# Trust X-Real-IP from upstream (traefik) when present, fall back to
# the immediate client IP otherwise. Lives at the http level (this file
# is included from /etc/nginx/nginx.conf into http {}) because `map`
# is only valid there. Without this passthrough, the rate limiter on
# the Go side collapses every visitor into the same bucket — see
# backend/internal/middleware/ratelimit.go.
map $http_x_real_ip $real_ip_passthrough {
    ""      $remote_addr;
    default $http_x_real_ip;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 250m;

    # Frontend (static files built by Vite)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_ip_passthrough;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
