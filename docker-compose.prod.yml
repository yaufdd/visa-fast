services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - internal
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.visa-fast.rule=Host(`ez-visa.ru`) || Host(`www.ez-visa.ru`)"
      - "traefik.http.routers.visa-fast.entrypoints=websecure"
      - "traefik.http.routers.visa-fast.tls=true"
      - "traefik.http.routers.visa-fast.tls.certresolver=letsencrypt"
      - "traefik.http.services.visa-fast.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik-public"

volumes:
  pgdata:
  uploads:

networks:
  internal:
  traefik-public:
    external: true
