name: Deploy to production

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fuji
          POSTGRES_PASSWORD: fuji123
          POSTGRES_DB: fujitravel
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.25' }
      - name: Unit tests
        run: cd backend && go test ./...
      - name: Install golang-migrate
        run: |
          curl -fsSL https://github.com/golang-migrate/migrate/releases/download/v4.17.0/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/local/bin/
      - name: Apply migrations
        env:
          DATABASE_URL: postgres://fuji:fuji123@localhost:5432/fujitravel?sslmode=disable
        run: migrate -path backend/migrations -database "$DATABASE_URL" up
      - name: Integration tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: '5432'
          DATABASE_URL: postgres://fuji:fuji123@localhost:5432/fujitravel?sslmode=disable
          APP_SECRET: test-secret-for-ci-only
          ANTHROPIC_API_KEY: dummy
        run: cd backend && go test -tags=integration ./...

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/visa-fast
            git pull origin main
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
